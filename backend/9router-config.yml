# 9router Configuration for Markaz-Arshy AI Router
# Place this file in the 9router installation directory

# Server Configuration
server:
  host: 0.0.0.0
  port: 8080
  log_level: info

# AI Provider Configuration
providers:
  # OpenAI Configuration
  openai:
    enabled: true
    api_key: ${OPENAI_API_KEY}
    base_url: https://api.openai.com/v1
    timeout: 60
    retry_attempts: 2
    models:
      - gpt-4o
      - gpt-4o-mini
      - gpt-4-turbo

  # Anthropic Configuration
  anthropic:
    enabled: true
    api_key: ${ANTHROPIC_API_KEY}
    base_url: https://api.anthropic.com/v1
    timeout: 60
    retry_attempts: 2
    models:
      - claude-3-5-sonnet-20241022
      - claude-3-haiku-20240307

  # Google AI Configuration
  google_ai:
    enabled: true
    api_key: ${GOOGLE_AI_API_KEY}
    base_url: https://generativelanguage.googleapis.com/v1
    timeout: 60
    retry_attempts: 2
    models:
      - gemini-1.5-pro
      - gemini-1.5-flash

# Webhook Configuration for Usage Tracking
webhook:
  enabled: true
  url: http://localhost:5000/api/ai-router-webhook/webhook/usage
  secret: ${WEBHOOK_SECRET}
  timeout: 5
  retry_attempts: 3
  batch_size: 1  # Send immediately, or batch for performance

# Rate Limiting Configuration
rate_limiting:
  enabled: true
  # Tier-based limits (requests per minute)
  tiers:
    BASIC: 10
    PRO: 60
    ENTERPRISE: 300
  
  # Global limits (safety net)
  global_max_rpm: 1000
  global_max_concurrent: 100

# Request/Response Logging
logging:
  enabled: true
  log_requests: true
  log_responses: true
  log_errors: true
  max_log_size: 1000  # characters
  sensitive_fields:  # Mask these in logs
    - api_key
    - authorization
    - password

# Security
security:
  # Validate API keys from Markaz-Arshy backend
  validate_keys: true
  validation_endpoint: http://localhost:5000/api/ai-router/validate-key
  
  # CORS settings
  cors:
    enabled: true
    allowed_origins:
      - http://localhost:5173
      - http://localhost:5000
    allowed_methods:
      - GET
      - POST
      - OPTIONS

# Monitoring & Health Check
monitoring:
  health_check_path: /health
  metrics_path: /metrics
  prometheus_enabled: false

# Advanced Options
advanced:
  # Caching (optional - can reduce costs)
  cache_enabled: false
  cache_ttl: 300  # seconds
  
  # Load balancing across providers
  load_balancing: false
  
  # Fallback providers if primary fails
  failover_enabled: true
