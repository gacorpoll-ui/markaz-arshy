<svg xmlns="http://www.w3.org/2000/svg" width="800" height="600" viewBox="0 0 800 600">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1035"/>
      <stop offset="50%" stop-color="#2d1b69"/>
      <stop offset="100%" stop-color="#4c1d95"/>
    </linearGradient>
    <linearGradient id="box" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#6d28d9"/>
    </linearGradient>
    <filter id="shadow"><feDropShadow dx="0" dy="4" stdDeviation="8" flood-opacity="0.3"/></filter>
  </defs>
  <rect width="800" height="600" fill="url(#bg)"/>
  <!-- Decorative circles -->
  <circle cx="650" cy="120" r="180" fill="rgba(124,58,237,0.08)"/>
  <circle cx="100" cy="500" r="120" fill="rgba(219,39,119,0.06)"/>
  <circle cx="400" cy="300" r="250" fill="rgba(124,58,237,0.04)"/>
  <!-- Boxes -->
  <g filter="url(#shadow)">
    <rect x="180" y="180" width="160" height="160" rx="16" fill="url(#box)" opacity="0.9"/>
    <text x="260" y="265" text-anchor="middle" font-size="48">📦</text>
    <text x="260" y="310" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold" fill="white">BOX L</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="380" y="220" width="130" height="130" rx="14" fill="#db2777" opacity="0.85"/>
    <text x="445" y="290" text-anchor="middle" font-size="42">🛍️</text>
    <text x="445" y="325" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="white">RETAIL</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="540" y="160" width="140" height="140" rx="14" fill="#f59e0b" opacity="0.85"/>
    <text x="610" y="235" text-anchor="middle" font-size="42">🏷️</text>
    <text x="610" y="275" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="white">DISC 40%</text>
  </g>
  <!-- Small floating items -->
  <text x="120" y="140" font-size="32" opacity="0.4">✨</text>
  <text x="700" y="450" font-size="28" opacity="0.3">✨</text>
  <text x="350" y="440" font-size="24" opacity="0.25">🛒</text>
</svg>
